<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Laot Niaga</title>
  <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body>
  <main class="page-shell">
    <div class="container">
      <div class="auth-box p-4 mx-auto" style="max-width: 460px;">
        <a href="index.html"><img class="brand-logo mb-4" src="assets/img/logo.svg" alt="Laot Niaga"></a>
        <h1>Masuk Akun</h1>
        <p class="text-muted">Demo UMKM: umkm@laotniaga.test, password: password123</p>
        <form data-login-form>
          <input class="mb-3" type="email" name="email" placeholder="Email" required>
          <input class="mb-3" type="password" name="password" placeholder="Password" required>
          <button class="btn btn-laot w-100 mb-3">Masuk</button>
          <a href="register.html">Belum punya akun? Daftar</a>
        </form>
      </div>
    </div>
  </main>
  <script src="js/main.js"></script>
</body>
</html>
