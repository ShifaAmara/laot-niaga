<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Jelajah produk UMKM hasil laut Aceh — ikan olahan, abon, kerupuk, dan lainnya di Laot Niaga.">
  <title>Marketplace — Laot Niaga</title>
  <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-gradient-orbs"></div>
  <div class="bg-orb-gold"></div>
  <div class="noise-overlay"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html"><img class="brand-logo" src="assets/img/logo.svg" alt="Laot Niaga"></a>
      <div class="nav-links">
        <a href="marketplace.html" class="active">Marketplace</a>
        <a href="niaga-ai.html">NiagaAI</a>
        <a href="dashboard-umkm.html">Dashboard</a>
        <div data-nav-auth>
          <a class="btn btn-outline btn-sm" href="login.html">Masuk</a>
          <a class="btn btn-primary btn-sm" href="register.html">Daftar</a>
        </div>
      </div>
      <button class="nav-toggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <main class="page-shell">
    <div class="container">
      <!-- Page Header -->
      <div class="mb-5 reveal">
        <span class="badge">🛒 Marketplace</span>
        <h1 class="section-title mt-3">Jelajah Produk Ikan & Olahan Laut</h1>
        <p class="lead" style="max-width:600px">Cari produk UMKM dengan informasi bahan, asal, stok, dan profil produsen yang jelas.</p>
      </div>

      <!-- Search & Filters -->
      <div class="search-bar mb-4 reveal">
        <input data-search placeholder="Cari keumamah, abon, kerupuk..." type="search">
        <select data-category>
          <option value="">Semua Kategori</option>
          <option>Ikan Olahan</option>
          <option>Siap Santap</option>
          <option>Camilan Laut</option>
        </select>
      </div>
      <div class="filter-chips mb-5 reveal">
        <button class="filter-chip active" data-filter-chip="">Semua</button>
        <button class="filter-chip" data-filter-chip="Ikan Olahan">🐟 Ikan Olahan</button>
        <button class="filter-chip" data-filter-chip="Siap Santap">🍽️ Siap Santap</button>
        <button class="filter-chip" data-filter-chip="Camilan Laut">🦐 Camilan Laut</button>
      </div>

      <!-- Product Grid -->
      <div class="products-grid" data-marketplace-grid></div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-wave"></div>
    <div class="container footer-inner">
      <div>
        <span class="footer-brand">🌊 Laot Niaga</span>
        <p class="footer-text mt-1">Marketplace hasil laut Aceh.</p>
      </div>
      <div class="footer-links">
        <a href="index.html">Beranda</a>
        <a href="niaga-ai.html">NiagaAI</a>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
