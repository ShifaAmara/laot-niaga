<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Daftar akun Laot Niaga — Bergabung sebagai pembeli atau UMKM hasil laut Aceh.">
  <title>Daftar — Laot Niaga</title>
  <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-gradient-orbs"></div>
  <div class="bg-orb-gold"></div>
  <div class="noise-overlay"></div>

  <main class="page-shell d-flex items-center justify-center" style="min-height:100vh;padding-top:40px">
    <div class="container d-flex justify-center">
      <div class="auth-box reveal" style="max-width:620px">
        <div class="text-center mb-4">
          <a href="index.html"><img class="brand-logo mx-auto mb-4" src="assets/img/logo.svg" alt="Laot Niaga"></a>
          <h1>Daftar Akun</h1>
          <p class="auth-subtitle">Bergabung sebagai pembeli atau UMKM hasil laut Aceh 🐟</p>
        </div>

        <form data-register-form>
          <div class="row g-3">
            <div class="col-6">
              <input class="mb-3" name="name" placeholder="👤 Nama lengkap" required>
            </div>
            <div class="col-6">
              <input class="mb-3" type="email" name="email" placeholder="📧 Email" required autocomplete="email">
            </div>
            <div class="col-6">
              <input class="mb-3" type="password" name="password" placeholder="🔒 Password" required autocomplete="new-password">
            </div>
            <div class="col-6">
              <select class="mb-3" name="role">
                <option value="buyer">🛒 Pembeli</option>
                <option value="umkm">🏪 UMKM / Nelayan</option>
              </select>
            </div>
            <div class="col-6">
              <input class="mb-3" name="store_name" placeholder="🏬 Nama toko (jika UMKM)">
            </div>
            <div class="col-6">
              <input class="mb-3" name="phone" placeholder="📱 Nomor WhatsApp">
            </div>
            <div class="col-12">
              <textarea class="mb-3" name="address" rows="2" placeholder="📍 Alamat"></textarea>
            </div>
            <div class="col-12">
              <textarea class="mb-3" name="story" rows="3" placeholder="📖 Cerita singkat UMKM (opsional)"></textarea>
            </div>
          </div>
          <button class="btn btn-primary w-100 btn-lg mb-4">Daftar Sekarang</button>
          <p class="text-center">
            <a class="auth-link" href="login.html">Sudah punya akun? Masuk →</a>
          </p>
        </form>
      </div>
    </div>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
