<!doctype html>
<html lang="id">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Marketplace - Laot Niaga</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="assets/css/custom.css">
  <style>
    :root {
      --laot-navy: #16215c;
      --laot-navy-dark: #0d1440;
      --laot-gold-1: #ffd24d;
      --laot-gold-2: #f5a300;
      --laot-bg-soft-1: #eef1fc;
      --laot-bg-soft-2: #e2e7fb;
      --laot-text-muted: #7b8091;
      --laot-line: #eef0f5;
      --radius-lg: 20px;
      --radius-md: 14px;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--laot-navy);
      background: #fff;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6,
    .font-display {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    /* ---------- Navbar ---------- */
    .navbar {
      padding-top: 1rem;
      padding-bottom: 1rem;
    }

    .brand-logo {
      height: 50px;
      width: auto;
      max-width: none;
      object-fit: contain;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border: 1.5px solid var(--laot-navy);
      color: var(--laot-navy);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: .15s ease;
    }

    .icon-btn:hover {
      background: var(--laot-navy);
      color: #fff;
    }

    .search-pill {
      background: var(--laot-bg-soft-1);
      border: none;
      border-radius: 999px;
      padding: .65rem 1.25rem .65rem 1rem;
      min-width: 280px;
    }

    .search-pill input {
      border: none;
      background: transparent;
      outline: none;
      font-size: .95rem;
      width: 100%;
    }

    .search-pill i {
      color: var(--laot-text-muted);
    }

    .btn-filter-pill {
      border: 1.5px solid var(--laot-navy);
      color: var(--laot-navy);
      border-radius: 999px;
      font-weight: 600;
      font-size: .9rem;
      padding: .55rem 1.3rem;
      background: #fff;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      transition: .15s ease;
    }

    .btn-filter-pill:hover {
      background: var(--laot-navy);
      color: #fff;
    }

    /* ---------- Hero / category strip ---------- */
    .hero-band {
      background: linear-gradient(180deg, var(--laot-bg-soft-1) 0%, var(--laot-bg-soft-2) 100%);
      border-radius: 28px;
      padding: 1.5rem 1.5rem 2rem;
    }

    .cat-scroll {
      display: flex;
      gap: .6rem;
      overflow-x: auto;
      padding-bottom: .25rem;
      scrollbar-width: none;
    }

    .cat-scroll::-webkit-scrollbar {
      display: none;
    }

    .cat-pill {
      flex: 0 0 auto;
      border: none;
      background: #ffffffb0;
      color: var(--laot-navy);
      font-weight: 600;
      font-size: .9rem;
      padding: .6rem 1.35rem;
      border-radius: 999px;
      white-space: nowrap;
      transition: .15s ease;
    }

    .cat-pill:hover {
      background: #ffffff;
    }

    .cat-pill.active {
      background: linear-gradient(135deg, var(--laot-gold-1), var(--laot-gold-2));
      color: var(--laot-navy-dark);
      box-shadow: 0 6px 14px rgba(245, 163, 0, .35);
    }

    /* ---------- Product cards ---------- */
    .card-product {
      border: none;
      background: transparent;
      padding: 8px;
      transition: .3s;
    }

    .card-product:hover {
      transform: translateY(-8px);
    }

    .img-wrapper {
      border-radius: var(--radius-md);
      aspect-ratio: 4/3.1;
      overflow: hidden;
      background: #f2f3f8;
    }

    .img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .35s ease;
    }

    .card-product:hover .img-wrapper img {
      transform: scale(1.06);
    }

    .store-badge {
      background: var(--laot-bg-soft-1);
      color: var(--laot-navy);
      font-size: .72rem;
      font-weight: 600;
      border-radius: 999px;
      padding: .2rem .55rem;
      display: inline-flex;
      align-items: center;
      gap: .25rem;
    }

    .store-badge i {
      color: var(--laot-gold-2);
    }

    .product-title {
      font-size: 1.6rem;
      line-height: 1;
      min-height: 1em;
      font-weight: bold;
    }

    .product-location {
      font-size: .8rem;
    }

    .product-price {

      font-size: 28px;

      font-weight: 800;

      color: #16215c;

    }

    .product-price small {
      font-weight: 500;
      font-size: .72rem;
    }

    .btn-cart {
      background: var(--laot-navy);
      color: #fff;
      font-weight: 600;
      font-size: .85rem;
      border: none;
      border-radius: 12px;
      padding: .6rem;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      transition: .15s ease;
    }

    .btn-cart:hover {
      background: var(--laot-navy-dark);
      color: #fff;
    }

    .btn-cart i {
      font-size: 1.05rem;
    }

    .empty-state {
      display: none;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--laot-text-muted);
    }

    @media (max-width:576px) {
      .search-pill {
        min-width: 0;
        width: 100%;
      }
    }
  </style>
</head>

<body class="bg-white">
  <nav class="navbar navbar-expand-lg bg-white sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <img class="brand-logo" src="assets/img/logo biru.png" alt="Laot Niaga">
      </a>

      <div class="d-none d-md-flex align-items-center search-pill mx-auto">
        <i class="bi bi-search me-2"></i>
        <input type="text" data-search placeholder="cari keumamah, terasi, kerupuk...">
      </div>

      <div class="ms-auto d-flex align-items-center gap-2">
        <button class="btn-filter-pill" type="button" data-bs-toggle="offcanvas" data-bs-target="#filterPanel">
          <i class="bi bi-sliders"></i> Filter
        </button>
        <a href="cart.html" class="icon-btn"><i class="bi bi-basket2"></i></a>
        <a href="login.html" class="icon-btn"><i class="bi bi-person"></i></a>
        <a href="niaga-ai.html" class="btn-ai">
          <i class="bi bi-stars"></i>
          NiagaAI
        </a>
      </div>
    </div>
  </nav>

  <main class="py-4">
    <div class="container">

      <div class="d-md-none mb-3">
        <div class="d-flex align-items-center search-pill w-100">
          <i class="bi bi-search me-2"></i>
          <input type="text" data-search placeholder="cari keumamah, terasi, kerupuk...">
        </div>
      </div>

      <div class="hero-band mb-4">
        <div class="cat-scroll" data-category-nav>
          <button class="cat-pill" data-category="ikan-asin">Ikan Asin</button>
          <button class="cat-pill" data-category="terasi">Terasi</button>
          <button class="cat-pill" data-category="kerupuk">Kerupuk</button>
          <button class="cat-pill" data-category="bakso-ikan">Bakso Ikan</button>
          <button class="cat-pill" data-category="abon">Abon</button>
          <button class="cat-pill" data-category="cumi">Cumi</button>
          <button class="cat-pill active" data-category="">Semua</button>
          <button class="cat-pill add-category-btn" id="addCategoryBtn">
            <i class="bi bi-plus-lg"></i>
          </button>
        </div>
      </div>

      <div class="row row-cols-2 row-cols-md-3 row-cols-lg-4 g-4" data-marketplace-grid>
      </div>


      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

      <script src="js/api.js"></script>
      <script src="js/marketplace.js"></script>
      <div class="modal fade" id="categoryModal" tabindex="-1">

        <div class="modal-dialog">

          <div class="modal-content">

            <div class="modal-header">

              <h5 class="modal-title">

                Tambah Kategori

              </h5>

              <button class="btn-close" data-bs-dismiss="modal">
              </button>

            </div>

            <div class="modal-body">

              <input id="newCategory" class="form-control" placeholder="Nama kategori">

            </div>

            <div class="modal-footer">

              <button class="btn btn-secondary" data-bs-dismiss="modal">

                Batal

              </button>

              <button id="saveCategory" class="btn btn-primary">

                Simpan

              </button>

            </div>

          </div>

        </div>

      </div>
</body>

</html>
