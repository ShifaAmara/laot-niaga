<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Profil Saya — Laot Niaga</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body>
<div class="noise-bg"></div><div class="noise-layer" id="noiseLayer"></div>
<nav class="ln-navbar">
  <div class="container"><div class="d-flex align-items-center gap-3 py-2">
    <a href="index.html"><img class="brand-logo" src="assets/img/logo biru.png" alt="Laot Niaga"></a>
    <span class="fw-800 ms-2">Profil Saya</span>
    <div class="ms-auto d-flex gap-2">
      <button class="theme-toggle"></button>
      <a href="marketplace.html" class="btn btn-outline-navy btn-sm px-3">Marketplace</a>
      <a href="orders.html" class="btn btn-ghost btn-sm">Pesanan</a>
    </div>
  </div></div>
</nav>

<main class="page-shell py-5">
  <div class="container" style="max-width:800px">
    <div class="row g-4">
      <!-- Profile Card -->
      <div class="col-md-4">
        <div class="panel p-4 text-center reveal">
          <div class="position-relative d-inline-block mb-3">
            <img id="avatarImg" src="assets/img/logo biru.png" class="rounded-circle" style="width:96px;height:96px;object-fit:cover;border:4px solid var(--ocean)">
            <label class="position-absolute bottom-0 end-0 btn btn-laot btn-sm p-1" style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center" title="Ganti foto">
              <i class="bi bi-camera-fill" style="font-size:.7rem"></i>
              <input type="file" accept="image/*" class="d-none" id="avatarInput">
            </label>
          </div>
          <h5 class="fw-800 mb-1" id="displayName">Pengguna</h5>
          <p class="small mb-2" id="displayEmail" style="color:var(--text-muted)">email@contoh.com</p>
          <span class="badge badge-laot rounded-pill" id="displayRole">Pembeli</span>
          <hr style="border-color:var(--line)">
          <div class="d-flex flex-column gap-2 text-start">
            <a href="orders.html" class="btn btn-ghost btn-sm text-start"><i class="bi bi-bag me-2" style="color:var(--ocean)"></i>Pesanan Saya</a>
            <a href="#" class="btn btn-ghost btn-sm text-start"><i class="bi bi-heart me-2" style="color:#ef4444"></i>Wishlist</a>
            <a href="chat.html" class="btn btn-ghost btn-sm text-start"><i class="bi bi-chat me-2" style="color:var(--teal)"></i>Pesan</a>
            <a href="dashboard.html" class="btn btn-ghost btn-sm text-start" id="dashLink" style="display:none"><i class="bi bi-speedometer2 me-2" style="color:var(--yellow)"></i>Dashboard Penjual</a>
            <hr style="border-color:var(--line)">
            <button class="btn btn-ghost btn-sm text-start text-danger" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Keluar</button>
          </div>
        </div>
      </div>

      <!-- Edit Form -->
      <div class="col-md-8 reveal reveal-d1">
        <div class="panel p-4">
          <h5 class="fw-800 mb-4">Edit Profil</h5>
          <form id="profileForm">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Nama Lengkap</label>
                <input type="text" class="form-control" id="editName" placeholder="Nama lengkap">
              </div>
              <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="editEmail" placeholder="email@contoh.com" readonly style="opacity:.7">
              </div>
              <div class="col-md-6">
                <label class="form-label">No. WhatsApp</label>
                <input type="tel" class="form-control" id="editPhone" placeholder="081234567890">
              </div>
              <div class="col-md-6">
                <label class="form-label">Kota / Daerah</label>
                <input type="text" class="form-control" id="editCity" placeholder="Banda Aceh">
              </div>
              <div class="col-12">
                <label class="form-label">Alamat Lengkap</label>
                <textarea class="form-control" id="editAddress" rows="2" placeholder="Jl. ..."></textarea>
              </div>
            </div>
            <hr style="border-color:var(--line)">
            <h6 class="fw-700 mb-3">Ganti Password</h6>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Password Baru</label>
                <input type="password" class="form-control" id="newPass" placeholder="Kosongkan jika tidak diubah">
              </div>
              <div class="col-md-6">
                <label class="form-label">Konfirmasi Password</label>
                <input type="password" class="form-control" id="confPass" placeholder="Ulangi password">
              </div>
            </div>
            <div class="mt-4 d-flex gap-2">
              <button type="submit" class="btn btn-navy px-4 fw-700">Simpan Perubahan</button>
              <button type="button" class="btn btn-ghost" onclick="loadProfile()">Reset</button>
            </div>
          </form>
        </div>

        <!-- Stats (buyer) -->
        <div class="row g-3 mt-2" id="buyerStats">
          <div class="col-4"><div class="stat-card" style="--accent:var(--ocean);--accent-pale:var(--ocean-pale)"><div class="stat-icon">📦</div><div class="stat-value" id="statOrders">0</div><div class="stat-label">Pesanan</div></div></div>
          <div class="col-4"><div class="stat-card" style="--accent:var(--yellow);--accent-pale:var(--yellow-pale)"><div class="stat-icon">❤️</div><div class="stat-value" id="statWl">0</div><div class="stat-label">Wishlist</div></div></div>
          <div class="col-4"><div class="stat-card" style="--accent:var(--teal);--accent-pale:var(--teal-pale)"><div class="stat-icon">⭐</div><div class="stat-value">4.9</div><div class="stat-label">Poin Loyalti</div></div></div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script><script src="js/cart.js"></script><script src="js/theme.js"></script><script src="js/ai-assistant.js"></script>
<script>
function loadProfile() {
  const user = getUser();
  if (!user) { location.href='login.html'; return; }
  document.getElementById('displayName').textContent = user.store_name||user.name||'Pengguna';
  document.getElementById('displayEmail').textContent = user.email||'';
  document.getElementById('displayRole').textContent = user.role==='umkm'?'Penjual UMKM':'🛒 Pembeli';
  document.getElementById('editName').value = user.name||'';
  document.getElementById('editEmail').value = user.email||'';
  document.getElementById('editPhone').value = user.phone||'';
  document.getElementById('editAddress').value = user.address||'';
  if (user.role==='umkm') document.getElementById('dashLink').style.display='';
  // Stats
  document.getElementById('statOrders').textContent = DEMO_ORDERS.length;
  document.getElementById('statWl').textContent = JSON.parse(localStorage.getItem('lnWishlist')||'[]').length;
}

document.getElementById('profileForm').addEventListener('submit', e => {
  e.preventDefault();
  const pwd = document.getElementById('newPass').value;
  const conf = document.getElementById('confPass').value;
  if (pwd && pwd!==conf) { showToast('Password tidak cocok!','error'); return; }
  const user = { ...getUser(),
    name: document.getElementById('editName').value,
    phone: document.getElementById('editPhone').value,
    address: document.getElementById('editAddress').value
  };
  saveSession({ token: localStorage.getItem('laotToken'), user });
  loadProfile();
  showToast('Profil berhasil disimpan ✓','success');
});

document.getElementById('avatarInput')?.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => document.getElementById('avatarImg').src = ev.target.result;
  reader.readAsDataURL(file);
});

document.addEventListener('DOMContentLoaded', loadProfile);
</script>
</body></html>
