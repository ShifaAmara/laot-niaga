<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Profil Toko — Laot Niaga</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body>
<div class="noise-bg"></div><div class="noise-layer" id="noiseLayer"></div>
<nav class="ln-navbar">
  <div class="container"><div class="d-flex align-items-center gap-3 py-2">
    <a href="index.html"><img class="brand-logo" src="assets/img/logo biru.png" alt="Laot Niaga"></a>
    <div class="ms-auto d-flex gap-2"><button class="theme-toggle"></button>
      <a href="marketplace.html" class="btn btn-ghost btn-sm"> Marketplace</a>
    </div>
  </div></div>
</nav>

<main class="page-shell py-4">
  <div class="container" id="sellerRoot">
    <!-- Skeleton -->
    <div class="skeleton rounded-4 mb-4" style="height:200px"></div>
    <div class="skeleton rounded-3 mb-3" style="height:80px;width:300px"></div>
  </div>
</main>

<footer class="ln-footer py-4 mt-5">
  <div class="container d-flex justify-content-between"><span class="footer-brand"> Laot Niaga</span></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script><script src="js/cart.js"></script><script src="js/theme.js"></script><script src="js/ai-assistant.js"></script>
<script>
function productCard(p) {
  return `<div class="col">
    <div class="product-card">
      <div class="img-wrapper"><a href="product-detail.html?id=${p.id}">
        <img class="card-img-top" src="${productImage(p)}" alt="${p.name}" loading="lazy">
      </a></div>
      <div class="card-body">
        <a href="product-detail.html?id=${p.id}" class="product-name d-block">${p.name}</a>
        <div class="d-flex align-items-center gap-1 mt-1"><span class="star">★</span><span style="font-size:.72rem;color:var(--text-muted)">${p.rating} (${p.sold})</span></div>
        <div class="product-price mt-1">${rupiah(p.price)}<span style="font-size:.7rem;color:var(--text-muted);font-weight:500"> /${p.unit}</span></div>
        <button class="btn-addcart mt-2" onclick="addToCart({id:${p.id},name:'${p.name.replace(/'/g,"\\'")}',price:${p.price},unit:'${p.unit}',image:'${productImage(p)}'})">
          <i class="bi bi-cart-plus me-1"></i>Keranjang
        </button>
      </div>
    </div>
  </div>`;
}

async function init() {
  const sellerId = new URLSearchParams(location.search).get('seller') || '1';
  const seller = DEMO_SELLERS.find(s=>String(s.id)===sellerId) || DEMO_SELLERS[0];
  const products = (await getProducts()).filter(p=>String(p.seller_id)===String(seller.id));
  const user = getUser();
  const isMine = user && String(user.id)===String(seller.id) && user.role==='umkm';

  document.getElementById('sellerRoot').innerHTML = `
  <!-- Banner -->
  <div class="seller-banner mb-0" style="border-radius:var(--r-2xl) var(--r-2xl) 0 0">
    <img src="${seller.banner||'assets/img/lautpantai.png'}" alt="${seller.name}" style="width:100%;height:100%;object-fit:cover">
    <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(12,27,94,.6),transparent)"></div>
  </div>

  <!-- Profile Info -->
  <div class="panel p-4 mb-4" style="border-radius:0 0 var(--r-2xl) var(--r-2xl);border-top:none">
    <div class="d-flex align-items-center gap-3 mb-3">
      <img src="${seller.avatar}" class="seller-profile-img" alt="${seller.name}" style="margin-top:-40px">
      <div class="flex-grow-1">
        <div class="d-flex align-items-center gap-2 flex-wrap">
          <h1 class="section-title mb-0" style="font-size:1.3rem">${seller.name}</h1>
          <span class="badge badge-teal rounded-pill"><i class="bi bi-patch-check-fill me-1"></i>Terverifikasi</span>
        </div>
        <div class="d-flex gap-3 mt-1 flex-wrap" style="font-size:.82rem;color:var(--text-muted)">
          <span><i class="bi bi-geo-alt me-1"></i>${seller.address}</span>
          <span><i class="bi bi-calendar me-1"></i>Bergabung ${seller.since}</span>
          <span class="star">★ ${seller.rating} Rating</span>
        </div>
      </div>
    </div>
    <p class="mb-3" style="font-size:.88rem;color:var(--text-2);max-width:600px">${seller.story}</p>
    <div class="d-flex gap-2 flex-wrap">
      <a href="chat.html?seller=${seller.id}" class="btn btn-navy btn-sm px-3"><i class="bi bi-chat me-1"></i>Chat</a>
      <button class="btn btn-outline-navy btn-sm px-3" onclick="showToast('Berhasil mengikuti toko ini!','success')"><i class="bi bi-heart me-1"></i>Ikuti</button>
      ${seller.isOwner?`<a href="dashboard.html" class="btn btn-outline-navy btn-sm px-3"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>`:''}
    </div>

    <!-- Stat Strip -->
    <div class="row g-3 mt-3">
      <div class="col-3 text-center">
        <div class="fw-800 fs-5" style="color:var(--ocean)">${seller.products}</div>
        <div style="font-size:.75rem;color:var(--text-muted)">Produk</div>
      </div>
      <div class="col-3 text-center">
        <div class="fw-800 fs-5" style="color:var(--teal)">${seller.sold}+</div>
        <div style="font-size:.75rem;color:var(--text-muted)">Terjual</div>
      </div>
      <div class="col-3 text-center">
        <div class="fw-800 fs-5" style="color:var(--yellow)">★${seller.rating}</div>
        <div style="font-size:.75rem;color:var(--text-muted)">Rating</div>
      </div>
      <div class="col-3 text-center">
        <div class="fw-800 fs-5" style="color:var(--navy)">${seller.followers}</div>
        <div style="font-size:.75rem;color:var(--text-muted)">Pengikut</div>
      </div>
    </div>
  </div>

  <!-- Products -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="fw-800 mb-0"> Produk Toko (${products.length})</h5>
    <div class="d-flex gap-2">
      <select class="form-select form-select-sm" style="width:auto;font-size:.82rem" id="sortSeller">
        <option>Terbaru</option><option>Harga Terendah</option><option>Rating</option><option>Terlaris</option>
      </select>
    </div>
  </div>
  <div class="row row-cols-2 row-cols-md-3 row-cols-lg-4 g-3">
    ${products.length ? products.map(productCard).join('') : `<div class="col-12 text-center py-5" style="color:var(--text-muted)"><i class="bi bi-box" style="font-size:2.5rem"></i><p class="mt-2">Belum ada produk</p></div>`}
  </div>`;

  // Reveal animation
  setTimeout(() => document.querySelectorAll('.reveal').forEach(el=>el.classList.add('visible')), 100);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body></html>
