<!doctype html>
<html lang="id">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Laot Niaga</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/custom.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
</head>

<body>
  <main class="page-shell">
    <div class="container">
      <div class="mx-auto auth-box bg-white rounded-3 p-4" style="max-width: 460px;">
        <a href="index.html"><img class="brand-logo mb-4" src="assets/img/logo biru.png" alt="Laot Niaga"></a>
        <h1 class="h3 fw-bold">Masuk Akun</h1>
        <p class="text-muted">Demo UMKM: umkm@laotniaga.test, password: password123</p>
        <form data-login-form>
          <input class="form-control mb-3" type="email" name="email" placeholder="Email" required>
          <input class="form-control mb-3" type="password" name="password" placeholder="Password" required>
          <button class="btn btn-laot w-100 mb-3">Masuk</button>
          <a href="register.html">Belum punya akun? Daftar</a>
        </form>
      </div>
    </div>
  </main>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
