<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Lacak Pesanan — Laot Niaga</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body>
<div class="noise-bg"></div><div class="noise-layer" id="noiseLayer"></div>
<nav class="ln-navbar">
  <div class="container"><div class="d-flex align-items-center gap-3 py-2">
    <a href="index.html"><img class="brand-logo" src="assets/img/logo biru.png" alt="Laot Niaga"></a>
    <span class="fw-800 ms-2">Lacak Pesanan</span>
    <div class="ms-auto d-flex gap-2"><button class="theme-toggle"></button><a href="orders.html" class="btn btn-ghost">← Kembali</a></div>
  </div></div>
</nav>

<main class="page-shell py-5">
  <div class="container" style="max-width:680px">
    <div class="panel p-4 p-md-5">
      <div class="text-center mb-4">
        <div style="font-size:3.5rem">📦</div>
        <h4 class="fw-800 mt-2">Status Pesanan</h4>
        <p id="orderId" style="color:var(--text-muted);font-size:.88rem">Memuat...</p>
      </div>

      <!-- Steps -->
      <div class="order-steps mb-4" id="trackSteps">
        <div class="order-step" id="step-new"><div class="step-icon"><i class="bi bi-bag-check"></i></div><div class="step-label">Pesanan Masuk</div></div>
        <div class="order-step" id="step-process"><div class="step-icon"><i class="bi bi-gear"></i></div><div class="step-label">Diproses</div></div>
        <div class="order-step" id="step-ship"><div class="step-icon"><i class="bi bi-truck"></i></div><div class="step-label">Dikirim</div></div>
        <div class="order-step" id="step-done"><div class="step-icon"><i class="bi bi-house-check"></i></div><div class="step-label">Diterima</div></div>
      </div>

      <!-- Timeline -->
      <div id="timeline" class="d-flex flex-column gap-3 mb-4"></div>

      <!-- No Resi -->
      <div class="p-3 rounded-3 mb-4" style="background:var(--ocean-pale);border:1px solid rgba(21,101,192,.15)">
        <div class="d-flex justify-content-between align-items-center">
          <div><div class="fw-700 small">Nomor Resi</div><div class="fw-800" id="resiNo">JNE-ACH123456789</div></div>
          <button class="btn btn-navy btn-sm px-3" onclick="copyResi()"><i class="bi bi-copy me-1"></i>Salin</button>
        </div>
      </div>

      <div class="d-flex gap-2 justify-content-center">
        <a href="orders.html" class="btn btn-outline-navy px-4">← Pesanan Saya</a>
        <a href="marketplace.html" class="btn btn-laot px-4">🐟 Belanja Lagi</a>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script><script src="js/cart.js"></script><script src="js/theme.js"></script><script src="js/ai-assistant.js"></script>
<script>
const statusOrder = ['new','process','ship','done'];
const timelineData = {
  new:    [{time:'20 Nov 10:05','event':'Pesanan diterima oleh sistem Laot Niaga'},],
  process:[{time:'20 Nov 10:05','event':'Pesanan diterima oleh sistem Laot Niaga'},{time:'20 Nov 11:30','event':'Penjual sedang menyiapkan paket Anda'}],
  ship:   [{time:'20 Nov 10:05','event':'Pesanan diterima'},{time:'20 Nov 11:30','event':'Penjual menyiapkan paket'},{time:'21 Nov 08:00','event':'Paket diserahkan ke JNE Banda Aceh'},{time:'21 Nov 16:20','event':'Paket dalam proses pengiriman'}],
  done:   [{time:'20 Nov 10:05','event':'Pesanan diterima'},{time:'20 Nov 11:30','event':'Penjual menyiapkan paket'},{time:'21 Nov 08:00','event':'Diserahkan ke kurir'},{time:'23 Nov 14:35','event':'✅ Paket telah diterima'}]
};

function initTracking() {
  const id = new URLSearchParams(location.search).get('id') || 'LN2024001';
  document.getElementById('orderId').textContent = `#${id}`;
  // Find order
  getOrders().then(orders => {
    const o = orders.find(x=>String(x.id)===String(id)) || orders[0];
    const status = o?.status || 'ship';
    const idx = statusOrder.indexOf(status);

    statusOrder.forEach((s,i) => {
      const el = document.getElementById('step-'+s);
      if (!el) return;
      if (i < idx) el.classList.add('done');
      else if (i === idx) el.classList.add('active');
    });

    const tl = timelineData[status] || timelineData.ship;
    document.getElementById('timeline').innerHTML = tl.map((t,i)=>`
      <div class="d-flex gap-3 ${i===tl.length-1?'fw-700':''}">
        <div class="d-flex flex-column align-items-center">
          <div style="width:12px;height:12px;border-radius:50%;background:${i===tl.length-1?'var(--teal)':'var(--glass-border2)'};flex-shrink:0;margin-top:4px"></div>
          ${i<tl.length-1?`<div style="width:2px;flex:1;background:var(--line);margin:4px 0"></div>`:''}
        </div>
        <div class="pb-2">
          <div style="font-size:.78rem;color:var(--text-muted)">${t.time}</div>
          <div style="font-size:.88rem">${t.event}</div>
        </div>
      </div>`).join('');
  });
}

function copyResi() {
  navigator.clipboard.writeText(document.getElementById('resiNo').textContent).then(()=>showToast('Nomor resi disalin! ✓','success'));
}

document.addEventListener('DOMContentLoaded', initTracking);
</script>
</body></html>
