<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Daftar akun Laot Niaga — Bergabung sebagai pembeli atau UMKM hasil laut Aceh.">
  <title>Daftar Akun — Laot Niaga</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body>
<div class="noise-bg"></div><div class="noise-layer" id="noiseLayer"></div>

<div class="auth-wrap" style="align-items:flex-start;padding-top:40px">
  <div class="w-100" style="max-width:580px">
    <div class="text-center mb-3 reveal">
      <a href="index.html" class="btn btn-ghost btn-sm"><i class="bi bi-arrow-left me-1"></i>Kembali ke Beranda</a>
    </div>

    <div class="auth-card reveal">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <a href="index.html"><img class="auth-logo" src="assets/img/logo biru.png" alt="Laot Niaga"></a>
        <button class="theme-toggle"></button>
      </div>

      <h1 class="h4 fw-800 mb-1">Buat Akun Baru 🌊</h1>
      <p class="mb-4" style="color:var(--text-muted);font-size:.88rem">Bergabung dan mulai belanja atau berjualan produk laut Aceh</p>

      <!-- Role Selector -->
      <div class="row g-3 mb-4" id="roleSelector">
        <div class="col-6">
          <div class="payment-option active h-100" data-role="buyer" onclick="selectRole('buyer')">
            <div class="text-center w-100">
              <div style="font-size:2rem;color:var(--ocean)"><i class="bi bi-cart-plus-fill"></i></div>
              <div class="fw-700 mt-1">Pembeli</div>
              <div style="font-size:.75rem;color:var(--text-muted)">Beli produk UMKM</div>
            </div>
            <div class="check"><i class="bi bi-check"></i></div>
          </div>
        </div>
        <div class="col-6">
          <div class="payment-option h-100" data-role="umkm" onclick="selectRole('umkm')">
            <div class="text-center w-100">
              <div style="font-size:2rem"></div>
              <div class="fw-700 mt-1">Penjual / UMKM</div>
              <div style="font-size:.75rem;color:var(--text-muted)">Jual produk lautmu</div>
            </div>
            <div class="check"><i class="bi bi-check"></i></div>
          </div>
        </div>
      </div>
      <input type="hidden" id="selectedRole" value="buyer">

      <form id="registerForm">
        <!-- Base fields -->
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Nama Lengkap</label>
            <input type="text" class="form-control" id="name" placeholder="Ahmad Fauzi" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="email@contoh.com" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Min. 6 karakter" required minlength="6">
          </div>
          <div class="col-md-6">
            <label class="form-label">No. WhatsApp</label>
            <input type="tel" class="form-control" id="phone" placeholder="081234567890">
          </div>
          <div class="col-12">
            <label class="form-label">Alamat Lengkap</label>
            <textarea class="form-control" id="address" rows="2" placeholder="Jl. Contoh No. 1, Kota"></textarea>
          </div>

          <!-- UMKM extra fields -->
          <div id="umkmFields" style="display:none;width:100%">
            <div class="row g-3">
              <div class="col-12">
                <div class="section-label mt-2" style="font-size:.7rem">INFO TOKO</div>
              </div>
              <div class="col-md-6">
                <label class="form-label">Nama Toko</label>
                <input type="text" class="form-control" id="storeName" placeholder="Dapur Laot Ku">
              </div>
              <div class="col-md-6">
                <label class="form-label">Jenis Produk Utama</label>
                <select class="form-select" id="mainProduct">
                  <option>Ikan Olahan</option>
                  <option>Siap Santap</option>
                  <option>Camilan Laut</option>
                  <option>Bumbu Laut</option>
                  <option>Lainnya</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">Cerita Singkat Toko</label>
                <textarea class="form-control" id="story" rows="2" placeholder="Ceritakan tentang UMKM kamu..."></textarea>
              </div>
            </div>
          </div>
        </div>

        <div class="form-check mt-3 mb-4">
          <input class="form-check-input" type="checkbox" id="agree" required>
          <label class="form-check-label" for="agree" style="font-size:.82rem">
            Saya setuju dengan <a href="#" style="color:var(--ocean)">Syarat & Ketentuan</a> dan <a href="#" style="color:var(--ocean)">Kebijakan Privasi</a>
          </label>
        </div>

        <button type="submit" class="btn btn-navy w-100 py-2 fw-700 mb-3" id="regBtn">
          <span id="regBtnText">Daftar Sekarang</span>
          <span id="regSpinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
        </button>
        <div class="text-center" style="font-size:.88rem;color:var(--text-muted)">
          Sudah punya akun? <a href="login.html" class="fw-700" style="color:var(--ocean)">Masuk →</a>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script><script src="js/cart.js"></script><script src="js/theme.js"></script>
<script>
if (getUser()) location.href = 'marketplace.html';

function selectRole(role) {
  document.querySelectorAll('#roleSelector .payment-option').forEach(el => {
    el.classList.toggle('active', el.dataset.role === role);
  });
  document.getElementById('selectedRole').value = role;
  document.getElementById('umkmFields').style.display = role==='umkm' ? 'block' : 'none';
}

document.getElementById('registerForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('regBtn');
  const btnTxt = document.getElementById('regBtnText');
  const spinner = document.getElementById('regSpinner');
  btn.disabled=true; btnTxt.textContent='Memproses...'; spinner.classList.remove('d-none');

  const role = document.getElementById('selectedRole').value;
  const payload = {
    name: document.getElementById('name').value.trim(),
    email: document.getElementById('email').value.trim(),
    password: document.getElementById('password').value,
    phone: document.getElementById('phone').value.trim(),
    address: document.getElementById('address').value.trim(),
    role,
    ...(role==='umkm' && {
      store_name: document.getElementById('storeName').value.trim() || document.getElementById('name').value+' Store',
      main_product: document.getElementById('mainProduct').value,
      story: document.getElementById('story').value.trim()
    })
  };

  try {
    const data = await registerApi(payload);
    saveSession(data);
    showToast('Akun berhasil dibuat! ','success');
    setTimeout(() => location.href = role==='umkm' ? 'dashboard.html' : 'marketplace.html', 900);
  } catch(err) {
    // Demo fallback
    const user = { id: Date.now(), ...payload, store_name: payload.store_name || payload.name };
    saveSession({ token:'demo-'+Date.now(), user });
    showToast('Akun berhasil dibuat! ','success');
    setTimeout(() => location.href = role==='umkm' ? 'dashboard.html' : 'marketplace.html', 900);
  }
});
</script>
</body></html>
