<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Chat — Laot Niaga</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body style="overflow:hidden">
<div class="noise-bg"></div><div class="noise-layer" id="noiseLayer"></div>

<nav class="ln-navbar" style="position:relative;z-index:100">
  <div class="container"><div class="d-flex align-items-center gap-3 py-2">
    <a href="index.html"><img class="brand-logo" src="assets/img/logo biru.png" alt="Laot Niaga"></a>
    <span class="fw-800 ms-2"><i class="bi bi-chat-dots-fill text-ocean me-2"></i>Pesan</span>
    <div class="ms-auto d-flex gap-2"><button class="theme-toggle"></button>
      <a href="marketplace.html" class="btn btn-ghost btn-sm">← Marketplace</a>
    </div>
  </div></div>
</nav>

<div class="chat-layout" style="position:relative;z-index:2">
  <!-- Sidebar: Conversation List -->
  <div class="chat-sidebar">
    <div class="p-3 border-bottom" style="border-color:var(--line)!important">
      <div class="nav-search">
        <i class="bi bi-search"></i>
        <input type="text" placeholder="Cari percakapan..." id="convSearch">
      </div>
    </div>
    <div id="convList">
      <!-- Rendered by JS -->
    </div>
  </div>

  <!-- Main Chat -->
  <div class="chat-main">
    <!-- Chat Header -->
    <div class="chat-header" id="chatHeader">
      <div style="color:var(--text-muted);font-style:italic;font-size:.88rem;text-align:center;width:100%">Pilih percakapan untuk memulai chat</div>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chatMessages">
      <div class="text-center py-5" style="color:var(--text-muted)">
        <i class="bi bi-chat-heart" style="font-size:3rem;color:var(--glass-border2)"></i>
        <p class="mt-3 small">Pilih penjual dari daftar untuk mulai chat</p>
      </div>
    </div>

    <!-- Typing indicator -->
    <div id="typingIndicator" style="padding:0 20px 4px;display:none">
      <div class="typing-indicator">
        <span></span><span></span><span></span>
        <span style="margin-left:8px;font-size:.75rem;color:var(--text-muted)">Penjual sedang mengetik...</span>
      </div>
    </div>

    <!-- Input Bar -->
    <div class="chat-input-bar" id="chatInputBar" style="display:none">
      <button class="icon-btn" style="border-radius:var(--r-md)" title="Lampirkan foto">
        <i class="bi bi-image"></i>
      </button>
      <input type="text" id="msgInput" placeholder="Ketik pesan...">
      <button class="icon-btn" style="border-radius:var(--r-md)" title="Emoji">
        <i class="bi bi-emoji-smile"></i>
      </button>
      <button class="chat-send-btn" id="sendMsgBtn">
        <i class="bi bi-send-fill"></i>
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script><script src="js/cart.js"></script><script src="js/theme.js"></script>
<script>
const user = JSON.parse(localStorage.getItem('ln_user') || 'null');
const isUmkm = user && user.role === 'umkm';

let DEMO_CONVS = [];
let DEMO_MESSAGES = {};

if (isUmkm) {
  DEMO_CONVS = [
    { id:1, seller_id:1, name:'Ahmad Fauzi', avatar:'https://ui-avatars.com/api/?name=Ahmad+Fauzi&background=0c1b5e&color=fff', online:true, last:'2 pack ya kak. Bisa dikirim ke Jakarta?', time:'10:05', unread:1 },
    { id:2, seller_id:2, name:'Budi Santoso', avatar:'https://ui-avatars.com/api/?name=Budi+Santoso&background=random', online:false, last:'Pesanan saya sudah dikemas?', time:'Kemarin', unread:0 },
  ];
  DEMO_MESSAGES = {
    1: [
      { from:'other', text:'Halo! Masih ada stok Keumamah Premium?', time:'10:00' },
      { from:'me', text:'Halo kak! Ada yang bisa saya bantu? Iya, stok masih ada 24 pack. Mau pesan berapa?', time:'10:02' },
      { from:'other', text:'2 pack ya kak. Bisa dikirim ke Jakarta?', time:'10:05' }
    ],
    2: [
      { from:'other', text:'Pesanan saya sudah dikemas?', time:'Kemarin 14:00' },
      { from:'me', text:'Siap, segera dikemas kak', time:'Kemarin 14:05' }
    ]
  };
} else {
  DEMO_CONVS = [
    { id:1, seller_id:1, name:'Dapur Laot Leupung', avatar:'https://ui-avatars.com/api/?name=Dapur+Laot+Leupung&background=0284c7&color=fff&size=128', online:true, last:'Bisa kak! Estimasi 3-5 hari via JNE.', time:'10:06', unread:1 },
    { id:2, seller_id:2, name:'Lhok Snack Bahari', avatar:'https://ui-avatars.com/api/?name=Lhok+Snack+Bahari&background=eab308&color=fff&size=128', online:false, last:'Siap, akan segera dikemas!', time:'Kemarin', unread:0 },
    { id:3, seller_id:3, name:'Nelayan Segar Sabang', avatar:'https://ui-avatars.com/api/?name=Nelayan+Segar+Sabang&background=14b8a6&color=fff&size=128', online:true, last:'Terima kasih sudah pesan 🙏', time:'Sen', unread:0 }
  ];
  DEMO_MESSAGES = {
    1: [
      { from:'me', text:'Halo! Masih ada stok Keumamah Premium?', time:'10:00' },
      { from:'other', text:'Halo kak! Ada yang bisa saya bantu? Iya, stok masih ada 24 pack. Mau pesan berapa?', time:'10:02' },
      { from:'me', text:'2 pack ya kak. Bisa dikirim ke Jakarta?', time:'10:05' },
      { from:'other', text:'Bisa kak! Estimasi 3-5 hari via JNE. Langsung order aja di marketplace ya kak', time:'10:06' }
    ],
    2: [
      { from:'me', text:'Pesanan saya sudah dikemas?', time:'Kemarin 14:00' },
      { from:'other', text:'Siap, akan segera dikemas!', time:'Kemarin 14:05' }
    ],
    3: [
      { from:'other', text:'Terima kasih sudah pesan 🙏', time:'Sen 09:00' }
    ]
  };
}

let activeConv = null;

// Pre-select from URL
const urlSeller = new URLSearchParams(location.search).get('seller');

function renderConvList() {
  const list = document.getElementById('convList');
  const search = document.getElementById('convSearch').value.toLowerCase();
  const filtered = DEMO_CONVS.filter(c => !search || c.name.toLowerCase().includes(search));

  list.innerHTML = filtered.map(c => `
  <div class="chat-user-item ${activeConv?.id===c.id?'active':''}" onclick="openConv(${c.id})" data-conv="${c.id}">
    <div class="chat-avatar">
      <img src="${c.avatar}" alt="${c.name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">
      ${c.online?'<div class="status-dot"></div>':''}
    </div>
    <div class="flex-grow-1 overflow-hidden">
      <div class="d-flex justify-content-between align-items-center">
        <span class="fw-700 small">${c.name}</span>
        <span style="font-size:.68rem;color:var(--text-muted)">${c.time}</span>
      </div>
      <div class="d-flex justify-content-between align-items-center">
        <span style="font-size:.78rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px">${c.last}</span>
        ${c.unread?`<span class="badge bg-ocean text-white rounded-pill" style="background:var(--ocean)!important;font-size:.65rem">${c.unread}</span>`:''}
      </div>
    </div>
  </div>`).join('');
}

function openConv(id) {
  activeConv = DEMO_CONVS.find(c=>c.id===id);
  if (!activeConv) return;
  // Clear unread
  activeConv.unread = 0;

  // Update header
  document.getElementById('chatHeader').innerHTML = `
    <div class="chat-avatar flex-shrink-0" style="width:40px;height:40px">
      <img src="${activeConv.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" alt="${activeConv.name}">
      ${activeConv.online?'<div class="status-dot"></div>':''}
    </div>
    <div>
      <div class="fw-700">${activeConv.name}</div>
      <div style="font-size:.72rem;color:var(--text-muted)">${activeConv.online?'<span style="color:#22c55e">● Online</span>':'⚫ Offline'}</div>
    </div>
    <div class="ms-auto d-flex gap-2">
      <a href="seller-profile.html?seller=${activeConv.seller_id}" class="icon-btn" title="Lihat Profil"><i class="bi bi-shop"></i></a>
      <button class="icon-btn" title="Info"><i class="bi bi-info-circle"></i></button>
    </div>`;

  renderMessages();
  document.getElementById('chatInputBar').style.display='flex';
  renderConvList();
  // Check for product preview from URL
  const productName = new URLSearchParams(location.search).get('product');
  if (productName && DEMO_MESSAGES[id]?.length === 0) {
    appendMessage(`Halo! Saya tertarik dengan produk: ${decodeURIComponent(productName)}`, 'me');
  }
}

function renderMessages() {
  const msgs = DEMO_MESSAGES[activeConv.id] || [];
  const container = document.getElementById('chatMessages');
  container.innerHTML = msgs.map(m => `
    <div class="d-flex ${m.from==='me'?'justify-content-end':''}">
      ${m.from!=='me'?`<div class="chat-avatar flex-shrink-0 me-2" style="width:32px;height:32px;margin-bottom:4px">
        <img src="${activeConv.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">
      </div>`:''}
      <div>
        <div class="msg-bubble from-${m.from==='me'?'me':'other'}">${m.text}<div class="msg-meta">${m.time} ${m.from==='me'?'<i class="bi bi-check2-all" style="color:rgba(255,255,255,.7)"></i>':''}</div></div>
      </div>
    </div>`).join('');
  container.scrollTop = container.scrollHeight;
}

function appendMessage(text, from) {
  if (!activeConv) return;
  if (!DEMO_MESSAGES[activeConv.id]) DEMO_MESSAGES[activeConv.id] = [];
  const time = new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
  DEMO_MESSAGES[activeConv.id].push({from, text, time});
  renderMessages();
  // Update last msg in sidebar
  activeConv.last = text.substring(0,30)+(text.length>30?'...':'');
  activeConv.time = time;
  renderConvList();
}

function sendMsg() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !activeConv) return;
  appendMessage(text, 'me');
  input.value = '';
  // Simulate reply
  document.getElementById('typingIndicator').style.display='block';
  setTimeout(() => {
    document.getElementById('typingIndicator').style.display='none';
    const replies = ['Baik kak! 😊','Siap, saya cek dulu ya','Iya tersedia kak, mau pesan berapa?','Terima kasih sudah menghubungi kami 🙏','Untuk pengiriman bisa JNE atau J&T kak'];
    appendMessage(replies[Math.floor(Math.random()*replies.length)], 'other');
  }, 1200 + Math.random()*800);
}

document.getElementById('sendMsgBtn')?.addEventListener('click', sendMsg);
document.getElementById('msgInput')?.addEventListener('keypress', e => { if(e.key==='Enter') sendMsg(); });
document.getElementById('convSearch')?.addEventListener('input', renderConvList);

document.addEventListener('DOMContentLoaded', () => {
  renderConvList();
  // Auto-open if seller param
  if (urlSeller) {
    const conv = DEMO_CONVS.find(c=>String(c.seller_id)===String(urlSeller));
    if (conv) openConv(conv.id);
    else openConv(DEMO_CONVS[0].id);
  }
});
</script>
</body></html>
