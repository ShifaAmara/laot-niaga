<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Detail Produk — Laot Niaga</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body>
<div class="noise-bg"></div><div class="noise-layer" id="noiseLayer"></div>
<nav class="ln-navbar">
  <div class="container"><div class="d-flex align-items-center gap-3 py-2">
    <a href="index.html" class="flex-shrink-0"><img class="brand-logo" src="assets/img/logo biru.png" alt="Laot Niaga"></a>
    <div class="nav-search flex-grow-1 d-none d-md-flex" style="max-width:400px"><i class="bi bi-search"></i><input type="text" placeholder="Cari produk..."></div>
    <div class="d-flex align-items-center gap-2 ms-auto">
      <button class="theme-toggle"></button>
      <a href="cart.html" class="icon-btn"><i class="bi bi-basket2"></i><span class="badge-dot" data-cart-count style="display:none"></span></a>
      <span data-show-guest><a href="login.html" class="btn btn-outline-navy btn-sm d-none d-sm-inline-flex">Masuk</a></span>
    </div>
  </div></div>
</nav>

<main class="page-shell py-4">
  <div class="container">
    <div class="ln-breadcrumb mb-4"><a href="index.html">Beranda</a><span class="sep">/</span><a href="marketplace.html">Marketplace</a><span class="sep">/</span><span id="breadProduct">Produk</span></div>
    <div id="detailContent">
      <!-- Skeleton -->
      <div class="row g-4">
        <div class="col-lg-5"><div class="skeleton rounded-4" style="aspect-ratio:1;width:100%"></div></div>
        <div class="col-lg-7"><div class="skeleton mb-3" style="height:32px;width:60%"></div><div class="skeleton mb-2" style="height:16px;width:40%"></div><div class="skeleton mb-4" style="height:16px;width:80%"></div></div>
      </div>
    </div>
  </div>
</main>

<footer class="ln-footer py-4 mt-5">
  <div class="container d-flex flex-wrap justify-content-between gap-3">
    <span class="footer-brand">Laot Niaga</span>
    <div class="d-flex gap-3"><a href="marketplace.html">Marketplace</a><a href="index.html">Beranda</a></div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script><script src="js/cart.js"></script><script src="js/theme.js"></script><script src="js/ai-assistant.js"></script>
<script>
let currentQty = 1;
let currentProduct = null;

async function init() {
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { location.href='marketplace.html'; return; }
  const p = await getProduct(id);
  if (!p) { location.href='marketplace.html'; return; }
  currentProduct = p;
  document.title = `${p.name} — Laot Niaga`;
  document.getElementById('breadProduct').textContent = p.name;
  renderDetail(p);
  renderReviews();
  renderRelated(p);
}

function renderDetail(p) {
  const disc = p.original_price ? Math.round((1-p.price/p.original_price)*100) : 0;
  const tags = (p.tags||[]).map(t=>`<span class="badge badge-laot rounded-pill me-1">${t}</span>`).join('');
  document.getElementById('detailContent').innerHTML = `
  <div class="row g-4 align-items-start">
    <div class="col-lg-5">
      <div class="product-gallery">
        <div class="main-img"><img id="mainImg" src="${productImage(p)}" alt="${p.name}"></div>
        <div class="thumbs">
          <div class="thumb active" onclick="setMainImg('${productImage(p)}',this)"><img src="${productImage(p)}" alt="thumb"></div>
          <div class="thumb" onclick="setMainImg('assets/img/keumamah.jpg',this)"><img src="assets/img/keumamah.jpg" alt="thumb"></div>
          <div class="thumb" onclick="setMainImg('assets/img/abon ikan.jpg',this)"><img src="assets/img/abon ikan.jpg" alt="thumb"></div>
        </div>
      </div>
    </div>

    <div class="col-lg-7">
      <!-- Seller Card -->
      <div class="store-card mb-3" style="position:relative;z-index:5">
        <div class="store-left">
          <img src="assets/img/logo biru.png" class="store-logo" alt="${p.store_name}">
          <div>
            <a href="seller-profile.html?seller=${p.seller_id||1}" class="store-name d-block">${p.store_name}</a>
            <div class="store-location"><i class="bi bi-geo-alt me-1"></i>${p.origin}</div>
          </div>
        </div>
        <a href="chat.html?seller=${p.seller_id||1}" class="store-chat btn btn-sm"><i class="bi bi-chat me-1"></i>Chat Penjual</a>
      </div>
      <div class="mb-2">${tags}</div>
      ${disc>0?`<span class="badge badge-yellow rounded-pill mb-2">Diskon ${disc}%</span>`:''}
      <h1 class="section-title">${p.name}</h1>
      <div class="d-flex align-items-center gap-3 mt-2 mb-3">
        <div class="star">★★★★${p.rating>=4.8?'★':'☆'}</div>
        <span style="font-size:.85rem;color:var(--text-muted)">${p.rating}/5 · ${p.sold} terjual · Stok: ${p.stock} ${p.unit}</span>
      </div>

      <div class="d-flex align-items-end gap-3 mb-4">
        <div style="font-size:2rem;font-weight:900;color:var(--navy)">${rupiah(p.price)}<span style="font-size:.9rem;font-weight:500;color:var(--text-muted)"> /${p.unit}</span></div>
        ${p.original_price?`<div class="product-price-old fs-6">${rupiah(p.original_price)}</div>`:''}
      </div>

      <!-- Info Chips -->
      <div class="d-flex flex-wrap gap-2 mb-4">
        <div class="info-chip"><i class="bi bi-geo-alt"></i>${p.origin}</div>
        <div class="info-chip"><i class="bi bi-calendar-check"></i>${p.expiry_info}</div>
        <div class="info-chip"><i class="bi bi-truck"></i>Gratis Ongkir</div>
        <div class="info-chip"><i class="bi bi-shield-check"></i>Produk Terverifikasi</div>
      </div>

      <!-- Qty -->
      <div class="mb-4">
        <div class="fw-700 small mb-2" style="color:var(--text-muted)">JUMLAH</div>
        <div class="d-flex align-items-center gap-3">
          <div class="qty-control">
            <button class="qty-btn" onclick="changeQty(-1)">−</button>
            <input class="qty-val" id="qtyVal" value="1" readonly>
            <button class="qty-btn" onclick="changeQty(1)">+</button>
          </div>
          <span style="font-size:.85rem;color:var(--text-muted)">Stok: ${p.stock} ${p.unit}</span>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="d-flex gap-3 mb-4 flex-wrap">
        <button class="btn btn-laot btn-lg px-4 fw-700" onclick="doBuyNow()"><i ></i>Beli Sekarang</button>
        <button class="btn btn-navy btn-lg px-4 fw-700" onclick="doAddCart()"><i ></i>Keranjang</button>
        <button class="icon-btn ${isWishlisted(p.id)?'active':''}" id="wlBtn" onclick="doWishlist()" title="Wishlist"><i class="bi bi-heart${isWishlisted(p.id)?'-fill':''}"></i></button>
      </div>

      <!-- Description -->
      <div class="panel p-4 mb-3">
        <h5 class="fw-800 mb-3">Deskripsi Produk</h5>
        <p style="color:var(--text-2);line-height:1.8;white-space:pre-line">${p.description}</p>
      </div>

      <!-- Detail Table -->
      <div class="panel p-4">
        <h5 class="fw-800 mb-3">Informasi Detail</h5>
        <table class="table table-sm" style="--bs-table-bg:transparent">
          <tbody style="color:var(--text-2)">
            <tr><td class="fw-600" style="width:40%;color:var(--text-muted)">Kategori</td><td>${p.category}</td></tr>
            <tr><td class="fw-600" style="color:var(--text-muted)">Bahan</td><td>${p.ingredients}</td></tr>
            <tr><td class="fw-600" style="color:var(--text-muted)">Cara Produksi</td><td>${p.production_method}</td></tr>
            <tr><td class="fw-600" style="color:var(--text-muted)">Ketahanan</td><td>${p.expiry_info}</td></tr>
            <tr><td class="fw-600" style="color:var(--text-muted)">Asal</td><td>${p.origin}</td></tr>
            <tr><td class="fw-600" style="color:var(--text-muted)">UMKM</td><td><a href="seller-profile.html?seller=${p.seller_id||1}">${p.store_name}</a></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <div id="reviewSection" class="mt-5"></div>
  <div id="relatedSection" class="mt-5"></div>`;
}

function setMainImg(src, thumb) {
  document.getElementById('mainImg').src = src;
  document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active'));
  thumb.classList.add('active');
}

function changeQty(d) {
  currentQty = Math.max(1, Math.min(currentProduct?.stock||99, currentQty+d));
  document.getElementById('qtyVal').value = currentQty;
}

function doAddCart() {
  if (!currentProduct) return;
  addToCart({id:currentProduct.id, name:currentProduct.name, price:currentProduct.price, unit:currentProduct.unit, image:productImage(currentProduct)}, currentQty);
}

function doBuyNow() {
  doAddCart();
  location.href = 'cart.html';
}

function doWishlist() {
  if (!currentProduct) return;
  const active = toggleWishlist({id:currentProduct.id, name:currentProduct.name, image:productImage(currentProduct)});
  const btn = document.getElementById('wlBtn');
  btn.classList.toggle('active', active);
  btn.querySelector('i').className = 'bi bi-heart' + (active?'-fill':'');
}

function renderReviews() {
  const reviews = [
    {name:'Ayu R.', rating:5, comment:'Produknya mantap! Kualitas sangat baik dan pengiriman cepat. Penjual responsif.', date:'3 hari lalu'},
    {name:'Budi S.', rating:5, comment:'Kemasan rapih, produk segar. Akan order lagi!', date:'1 minggu lalu'},
    {name:'Rina M.', rating:4, comment:'Enak rasanya, sesuai dengan deskripsi. Harga oke untuk kualitas ini.', date:'2 minggu lalu'}
  ];
  const stars = n => '★'.repeat(n) + '☆'.repeat(5-n);
  document.getElementById('reviewSection').innerHTML = `
  <h4 class="fw-800 mb-4">Ulasan Pembeli (${reviews.length})</h4>
  <div class="row g-3">
    ${reviews.map(r=>`<div class="col-md-4"><div class="review-card h-100">
      <div class="d-flex gap-2 mb-2">
        <img src="assets/img/logo biru.png" class="reviewer-avatar" alt="${r.name}">
        <div><div class="fw-700 small">${r.name}</div><div class="star">${stars(r.rating)}</div></div>
      </div>
      <p style="font-size:.88rem;color:var(--text-2)">"${r.comment}"</p>
      <small style="color:var(--text-muted)">${r.date}</small>
    </div></div>`).join('')}
  </div>`;
}

async function renderRelated(current) {
  const all = await getProducts();
  const related = all.filter(p=>p.id!==current.id && p.category===current.category).slice(0,4);
  if (!related.length) return;
  document.getElementById('relatedSection').innerHTML = `
  <h4 class="fw-800 mb-4">Produk Terkait</h4>
  <div class="row row-cols-2 row-cols-md-4 g-3">
    ${related.map(p=>`<div class="col"><div class="product-card">
      <div class="img-wrapper"><a href="product-detail.html?id=${p.id}"><img class="card-img-top" src="${productImage(p)}" alt="${p.name}" loading="lazy"></a></div>
      <div class="card-body"><a href="product-detail.html?id=${p.id}" class="product-name d-block">${p.name}</a>
      <div class="product-price">${rupiah(p.price)}</div></div>
    </div></div>`).join('')}
  </div>`;
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body></html>
