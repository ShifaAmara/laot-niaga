<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Keranjang — Laot Niaga</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body>
<div class="noise-bg"></div><div class="noise-layer" id="noiseLayer"></div>
<nav class="ln-navbar">
  <div class="container"><div class="d-flex align-items-center gap-3 py-2">
    <a href="index.html" class="flex-shrink-0"><img class="brand-logo" src="assets/img/logo biru.png" alt="Laot Niaga"></a>
    <span class="fw-800 ms-2" style="font-size:1.1rem">Keranjang Belanja 🛒</span>
    <div class="d-flex align-items-center gap-2 ms-auto">
      <button class="theme-toggle"></button>
      <a href="marketplace.html" class="btn btn-ghost"><i class="bi bi-arrow-left me-1"></i>Lanjut Belanja</a>
    </div>
  </div></div>
</nav>

<main class="page-shell py-5">
  <div class="container">
    <div class="row g-4" id="cartRoot">
      <!-- Rendered by JS -->
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script><script src="js/cart.js"></script><script src="js/theme.js"></script><script src="js/ai-assistant.js"></script>
<script>
function renderCart() {
  const cart = getCart();
  const root = document.getElementById('cartRoot');
  if (cart.length === 0) {
    root.innerHTML = `<div class="col-12 text-center py-5">
      <div style="font-size:4rem">🛒</div>
      <h4 class="mt-3 fw-800">Keranjang Kosong</h4>
      <p style="color:var(--text-muted)">Temukan produk laut Aceh yang kamu suka!</p>
      <a href="marketplace.html" class="btn btn-laot px-4 mt-2">Mulai Belanja</a>
    </div>`;
    return;
  }

  const total = getCartTotal();
  const ongkir = total >= 100000 ? 0 : 15000;
  const grandTotal = total + ongkir;

  root.innerHTML = `
  <div class="col-lg-8">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="fw-800 mb-0">${cart.length} Produk</h5>
      <button class="btn btn-ghost text-danger btn-sm" onclick="if(confirm('Hapus semua?')){clearCart();renderCart();}">Hapus Semua</button>
    </div>
    <div class="d-flex flex-column gap-3" id="cartItems">
      ${cart.map(item => `
      <div class="cart-item" id="ci-${item.id}">
        <a href="product-detail.html?id=${item.id}"><img src="${item.image||'assets/img/keumamah.jpg'}" alt="${item.name}"></a>
        <div class="flex-grow-1">
          <div class="fw-700">${item.name}</div>
          <div style="font-size:.82rem;color:var(--text-muted)">per ${item.unit||'pcs'}</div>
          <div class="fw-800 mt-1" style="color:var(--navy)">${rupiah(item.price)}</div>
        </div>
        <div class="d-flex flex-column align-items-end gap-2">
          <button class="btn-ghost text-danger" onclick="removeFromCart(${item.id})" style="font-size:.8rem;padding:4px 8px"><i class="bi bi-trash"></i></button>
          <div class="qty-control">
            <button class="qty-btn" onclick="updateQty(${item.id},${(item.qty||1)-1})">−</button>
            <span class="qty-val">${item.qty||1}</span>
            <button class="qty-btn" onclick="updateQty(${item.id},${(item.qty||1)+1})">+</button>
          </div>
          <div class="fw-800 small" style="color:var(--ocean)">${rupiah(item.price*(item.qty||1))}</div>
        </div>
      </div>`).join('')}
    </div>
  </div>

  <div class="col-lg-4">
    <div class="order-summary-card">
      <h6 class="fw-800 mb-4">Ringkasan Pesanan</h6>
      <div class="summary-row"><span style="color:var(--text-muted)">Subtotal</span><span class="fw-600">${rupiah(total)}</span></div>
      <div class="summary-row"><span style="color:var(--text-muted)">Ongkos Kirim</span>
        <span class="fw-600 ${ongkir===0?'text-teal':''}">${ongkir===0?'GRATIS':rupiah(ongkir)}</span>
      </div>
      ${ongkir>0?`<div class="mb-3 p-2 rounded-3" style="background:var(--yellow-pale);font-size:.78rem;color:#92400e">💡 Tambah <b>${rupiah(100000-total)}</b> lagi untuk gratis ongkir!</div>`:'<div class="mb-3 p-2 rounded-3 badge-teal" style="font-size:.78rem">✅ Gratis ongkir sudah didapat!</div>'}
      <div class="summary-row total"><span>Total</span><span style="color:var(--navy)">${rupiah(grandTotal)}</span></div>
      <a href="checkout.html" class="btn btn-laot w-100 mt-3 py-2 fw-700"><i class="bi bi-lightning-fill me-2"></i>Lanjut Checkout</a>
      <a href="marketplace.html" class="btn btn-ghost w-100 mt-2 fw-600">← Tambah Produk Lain</a>
    </div>
  </div>`;
}
document.addEventListener('DOMContentLoaded', renderCart);
</script>
</body></html>
