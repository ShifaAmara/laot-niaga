<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Kelola Produk — Laot Niaga</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body data-dashboard="umkm">
<div class="noise-bg"></div><div class="noise-layer" id="noiseLayer"></div>

<nav class="ln-navbar">
  <div class="container"><div class="d-flex align-items-center gap-3 py-2">
    <a href="index.html"><img class="brand-logo" src="assets/img/logo biru.png" alt="Laot Niaga"></a>
    <span class="fw-700 small d-none d-md-block" style="color:var(--text-muted)">Kelola Produk</span>
    <div class="ms-auto d-flex gap-2">
      <button class="theme-toggle"></button>
      <a href="dashboard.html" class="btn btn-ghost btn-sm"><i class="bi bi-arrow-left me-1"></i>Dashboard</a>
    </div>
  </div></div>
</nav>

<div class="dash-layout" style="position:relative;z-index:2">
  <!-- Sidebar -->
  <aside class="dash-sidebar">
    <div class="store-info"><div class="d-flex align-items-center gap-2"><img src="assets/img/logo biru.png" class="store-avatar" alt="Toko"><div><div class="fw-800 small" id="storeNameSidebar">Toko Saya</div><div style="font-size:.7rem;color:var(--text-muted)">Penjual Terverifikasi ✓</div></div></div></div>
    <div class="dash-nav-section">Menu Utama</div>
    <a href="dashboard.html" class="dash-nav-item"><i class="bi bi-speedometer2"></i>Dashboard</a>
    <a href="dashboard-products.html" class="dash-nav-item active"><i class="bi bi-box-seam"></i>Produk</a>
    <a href="dashboard-orders.html" class="dash-nav-item"><i class="bi bi-bag-check"></i>Pesanan</a>
    <a href="chat.html" class="dash-nav-item"><i class="bi bi-chat-dots"></i>Chat Pembeli</a>
    <div class="dash-nav-section">Toko</div>
    <a href="seller-profile.html?seller=1" class="dash-nav-item"><i class="bi bi-shop"></i>Profil Toko</a>
    <a href="#" class="dash-nav-item"><i class="bi bi-gear"></i>Pengaturan</a>
  </aside>

  <div class="dash-content">
    <div class="dash-header reveal">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div><div class="section-label">Manajemen Produk</div><h1 class="section-title">Kelola Produk </h1></div>
        <button class="btn btn-laot px-4 fw-700" data-bs-toggle="modal" data-bs-target="#addProductModal">
          <i class="bi bi-plus-lg me-2"></i>Tambah Produk
        </button>
      </div>
    </div>

    <!-- Search + Filter -->
    <div class="panel p-3 mb-4 reveal">
      <div class="row g-3 align-items-center">
        <div class="col-md-5">
          <div class="nav-search"><i class="bi bi-search"></i><input type="text" id="prodSearch" placeholder="Cari produk..."></div>
        </div>
        <div class="col-md-3">
          <select class="form-select" id="prodCatFilter">
            <option value="">Semua Kategori</option>
            <option>Ikan Olahan</option><option>Siap Santap</option><option>Camilan Laut</option><option>Bumbu Laut</option>
          </select>
        </div>
        <div class="col-md-2">
          <select class="form-select" id="prodStatusFilter">
            <option value="">Semua Status</option>
            <option value="active">Aktif</option><option value="low">Stok Rendah</option>
          </select>
        </div>
        <div class="col-md-2">
          <div class="fw-700 small" style="color:var(--text-muted)" id="prodCount">Memuat...</div>
        </div>
      </div>
    </div>

    <!-- Product Table -->
    <div class="panel reveal">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0" style="--bs-table-bg:transparent">
          <thead>
            <tr style="border-color:var(--line)">
              <th style="font-size:.72rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;padding:14px 16px;border-color:var(--line);background:var(--bg-soft)">Produk</th>
              <th style="font-size:.72rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;border-color:var(--line);background:var(--bg-soft)">Kategori</th>
              <th style="font-size:.72rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;border-color:var(--line);background:var(--bg-soft)">Harga</th>
              <th style="font-size:.72rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;border-color:var(--line);background:var(--bg-soft)">Stok</th>
              <th style="font-size:.72rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;border-color:var(--line);background:var(--bg-soft)">Terjual</th>
              <th style="font-size:.72rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;border-color:var(--line);background:var(--bg-soft)">Status</th>
              <th style="font-size:.72rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;border-color:var(--line);background:var(--bg-soft)">Aksi</th>
            </tr>
          </thead>
          <tbody id="productTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Add Product Modal -->
<div class="modal fade" id="addProductModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content" style="background:var(--card);border:1px solid var(--glass-border)">
      <div class="modal-header" style="border-color:var(--line)">
        <h5 class="modal-title fw-800"><i class="bi bi-plus-circle-fill text-ocean me-2"></i>Tambah Produk Baru</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="addProductForm">
          <div class="row g-3">
            <div class="col-md-8">
              <label class="form-label">Nama Produk <span class="text-danger">*</span></label>
              <input type="text" class="form-control" name="name" placeholder="Keumamah Premium Aceh" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Kategori <span class="text-danger">*</span></label>
              <select class="form-select" name="category" required>
                <option value="">Pilih...</option>
                <option>Ikan Olahan</option><option>Siap Santap</option><option>Camilan Laut</option><option>Bumbu Laut</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">Harga (Rp) <span class="text-danger">*</span></label>
              <input type="number" class="form-control" name="price" placeholder="45000" required min="0">
            </div>
            <div class="col-md-4">
              <label class="form-label">Harga Coret (Rp)</label>
              <input type="number" class="form-control" name="original_price" placeholder="55000" min="0">
            </div>
            <div class="col-md-4">
              <label class="form-label">Stok <span class="text-danger">*</span></label>
              <input type="number" class="form-control" name="stock" placeholder="24" required min="0">
            </div>
            <div class="col-md-4">
              <label class="form-label">Satuan</label>
              <input type="text" class="form-control" name="unit" placeholder="pack / kg / jar">
            </div>
            <div class="col-md-4">
              <label class="form-label">Asal Produk</label>
              <input type="text" class="form-control" name="origin" placeholder="Banda Aceh">
            </div>
            <div class="col-md-4">
              <label class="form-label">Berat (gram)</label>
              <input type="number" class="form-control" name="weight" placeholder="200">
            </div>
            <div class="col-12">
              <label class="form-label">Bahan-Bahan</label>
              <input type="text" class="form-control" name="ingredients" placeholder="Ikan tongkol, garam, rempah...">
            </div>
            <div class="col-12">
              <label class="form-label">Deskripsi Produk <span class="text-danger">*</span></label>
              <textarea class="form-control" name="description" rows="3" placeholder="Deskripsi lengkap produk..." required></textarea>
            </div>
            <div class="col-md-6">
              <label class="form-label">Ketahanan Produk</label>
              <input type="text" class="form-control" name="expiry_info" placeholder="6 bulan dalam kemasan tertutup">
            </div>
            <div class="col-md-6">
              <label class="form-label">Foto Produk</label>
              <input type="file" class="form-control" name="image" accept="image/*">
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer" style="border-color:var(--line)">
        <button class="btn btn-ghost" data-bs-dismiss="modal">Batal</button>
        <button class="btn btn-laot px-4 fw-700" id="saveProductBtn"><i class="bi bi-check-lg me-1"></i>Simpan Produk</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script><script src="js/cart.js"></script><script src="js/theme.js"></script>
<script>
const user = getUser();
if (!user || user.role !== 'umkm') location.href = 'login.html';
else document.getElementById('storeNameSidebar').textContent = user.store_name||user.name;

let products = [...DEMO_PRODUCTS];

function filterProds() {
  const search = document.getElementById('prodSearch').value.toLowerCase();
  const cat = document.getElementById('prodCatFilter').value;
  const status = document.getElementById('prodStatusFilter').value;
  return products.filter(p => {
    const matchSearch = !search || (p.name+p.category).toLowerCase().includes(search);
    const matchCat = !cat || p.category===cat;
    const matchStatus = !status || (status==='low'?p.stock<20:true);
    return matchSearch && matchCat && matchStatus;
  });
}

function renderTable() {
  const filtered = filterProds();
  document.getElementById('prodCount').textContent = `${filtered.length} Produk`;
  const tbody = document.getElementById('productTableBody');
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="7" class="text-center py-5" style="color:var(--text-muted)"><i class="bi bi-box" style="font-size:2rem"></i><p class="mt-2">Tidak ada produk</p></td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(p => `
  <tr style="border-color:var(--line)">
    <td style="padding:12px 16px">
      <div class="d-flex align-items-center gap-3">
        <img src="${productImage(p)}" style="width:48px;height:48px;border-radius:var(--r-md);object-fit:cover" alt="${p.name}">
        <div><div class="fw-700 small">${p.name}</div><div style="font-size:.72rem;color:var(--text-muted)">${p.origin}</div></div>
      </div>
    </td>
    <td><span class="badge badge-laot rounded-pill">${p.category}</span></td>
    <td class="fw-700 small">${rupiah(p.price)}</td>
    <td>
      <div class="d-flex align-items-center gap-2">
        <span class="fw-700 ${p.stock<10?'text-danger':p.stock<20?'text-warning':''}">${p.stock}</span>
        ${p.stock<20?`<span style="font-size:.65rem;color:${p.stock<10?'#ef4444':'#f59e0b'}">⚠️ Rendah</span>`:''}
      </div>
    </td>
    <td class="small">${p.sold}x</td>
    <td><span class="badge badge-teal rounded-pill">Aktif</span></td>
    <td>
      <div class="d-flex gap-1">
        <a href="product-detail.html?id=${p.id}" class="btn btn-ghost btn-sm px-2" title="Lihat"><i class="bi bi-eye"></i></a>
        <button class="btn btn-ghost btn-sm px-2" title="Edit" onclick="editProduct(${p.id})"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-ghost btn-sm px-2 text-danger" title="Hapus" onclick="deleteProduct(${p.id})"><i class="bi bi-trash"></i></button>
      </div>
    </td>
  </tr>`).join('');
}

function editProduct(id) { showToast('Fitur edit akan segera hadir ','info'); }
function deleteProduct(id) {
  if (!confirm('Yakin hapus produk ini?')) return;
  products = products.filter(p=>p.id!==id);
  renderTable();
  showToast('Produk dihapus ✓','success');
}

document.getElementById('saveProductBtn')?.addEventListener('click', () => {
  const form = document.getElementById('addProductForm');
  if (!form.checkValidity()) { form.reportValidity(); return; }
  const data = Object.fromEntries(new FormData(form));
  const newProd = { id: Date.now(), ...data, price:parseInt(data.price), stock:parseInt(data.stock), rating:0, sold:0, seller_id:user.id, store_name:user.store_name, image:'assets/img/keumamah.jpg', origin:data.origin||user.address||'Aceh' };
  products.unshift(newProd);
  bootstrap.Modal.getInstance(document.getElementById('addProductModal')).hide();
  form.reset(); renderTable();
  showToast('Produk berhasil ditambahkan! ✓','success');
});

['prodSearch','prodCatFilter','prodStatusFilter'].forEach(id => document.getElementById(id)?.addEventListener('input', renderTable));

// Check for #add anchor to auto-open modal
if (location.hash==='#add') {
  document.addEventListener('DOMContentLoaded', () => { new bootstrap.Modal(document.getElementById('addProductModal')).show(); });
}

document.addEventListener('DOMContentLoaded', renderTable);
</script>
</body></html>
