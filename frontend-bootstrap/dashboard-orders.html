<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Kelola Pesanan — Laot Niaga</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body data-dashboard="umkm">
<div class="noise-bg"></div><div class="noise-layer" id="noiseLayer"></div>

<nav class="ln-navbar">
  <div class="container"><div class="d-flex align-items-center gap-3 py-2">
    <a href="index.html"><img class="brand-logo" src="assets/img/logo biru.png" alt="Laot Niaga"></a>
    <span class="fw-700 small d-none d-md-block" style="color:var(--text-muted)">Kelola Pesanan</span>
    <div class="ms-auto d-flex gap-2">
      <button class="theme-toggle"></button>
      <a href="dashboard.html" class="btn btn-ghost btn-sm"><i class="bi bi-arrow-left me-1"></i>Dashboard</a>
    </div>
  </div></div>
</nav>

<div class="dash-layout" style="position:relative;z-index:2">
  <aside class="dash-sidebar">
    <div class="store-info"><div class="d-flex align-items-center gap-2"><img src="assets/img/logo biru.png" class="store-avatar" alt="Toko"><div><div class="fw-800 small" id="storeNameSidebar">Toko Saya</div><div style="font-size:.7rem;color:var(--text-muted)">Penjual Terverifikasi ✓</div></div></div></div>
    <div class="dash-nav-section">Menu Utama</div>
    <a href="dashboard.html" class="dash-nav-item"><i class="bi bi-speedometer2"></i>Dashboard</a>
    <a href="dashboard-products.html" class="dash-nav-item"><i class="bi bi-box-seam"></i>Produk</a>
    <a href="dashboard-orders.html" class="dash-nav-item active"><i class="bi bi-bag-check"></i>Pesanan</a>
    <a href="chat.html" class="dash-nav-item"><i class="bi bi-chat-dots"></i>Chat Pembeli</a>
    <div class="dash-nav-section">Toko</div>
    <a href="seller-profile.html?seller=1" class="dash-nav-item"><i class="bi bi-shop"></i>Profil Toko</a>
    <a href="#" class="dash-nav-item"><i class="bi bi-gear"></i>Pengaturan</a>
  </aside>

  <div class="dash-content">
    <div class="dash-header reveal">
      <div class="section-label">Manajemen Pesanan</div>
      <h1 class="section-title"><i class="bi bi-cart-check me-2"></i>Kelola Pesanan</h1>
    </div>

    <!-- Status tabs -->
    <div class="cat-scroll mb-4 reveal">
      <button class="cat-chip active" data-status="">Semua <span id="tabAll" class="badge rounded-pill ms-1" style="background:var(--ocean);color:#fff;font-size:.65rem">3</span></button>
      <button class="cat-chip" data-status="new">Baru</button>
      <button class="cat-chip" data-status="process">Diproses</button>
      <button class="cat-chip" data-status="ship">Dikirim</button>
      <button class="cat-chip" data-status="done">Selesai</button>
    </div>

    <!-- Orders -->
    <div id="sellerOrdersList" class="d-flex flex-column gap-3"></div>
  </div>
</div>

<!-- Order Detail Offcanvas -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="orderDetail" style="width:420px;background:var(--card)">
  <div class="offcanvas-header" style="border-bottom:1px solid var(--line)">
    <h5 class="offcanvas-title fw-800">Detail Pesanan</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body" id="orderDetailContent"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script><script src="js/cart.js"></script><script src="js/theme.js"></script>
<script>
const user = getUser();
if (!user || user.role!=='umkm') location.href='login.html';
else document.getElementById('storeNameSidebar').textContent = user.store_name||user.name;

// Extended demo orders for seller view
const SELLER_ORDERS = [
  { id:'LN2024001', date:'20 Nov 2024 10:05', buyer:'Ahmad Fauzi', phone:'087654321098', address:'Jl. Sudirman No. 5, Jakarta Selatan', status:'done', courier:'JNE', resi:'JNE-ACH123456789', total:83000, items:[{name:'Keumamah Premium',qty:1,price:45000,img:'assets/img/keumamah.jpg'},{name:'Abon Ikan Laut',qty:1,price:38000,img:'assets/img/abon ikan.jpg'}] },
  { id:'LN2024002', date:'23 Nov 2024 14:22', buyer:'Budi Santoso', phone:'081234567890', address:'Jl. Gatot Subroto No. 12, Bandung', status:'ship', courier:'J&T', resi:'JT-BDG789012345', total:55000, items:[{name:'Bakso Ikan Tuna Jumbo',qty:1,price:55000,img:'assets/img/kerupuk ikan.jpg'}] },
  { id:'LN2024003', date:'25 Nov 2024 09:15', buyer:'Rina Marlina', phone:'089876543210', address:'Jl. Ahmad Yani No. 8, Surabaya', status:'process', courier:'SiCepat', resi:'-', total:44000, items:[{name:'Kerupuk Ikan Pesisir',qty:2,price:22000,img:'assets/img/kerupuk ikan.jpg'}] },
  { id:'LN2024004', date:'26 Nov 2024 11:30', buyer:'Dian Sari', phone:'082345678901', address:'Jl. Diponegoro No. 3, Medan', status:'new', courier:'JNE', resi:'-', total:90000, items:[{name:'Keumamah Premium',qty:2,price:45000,img:'assets/img/keumamah.jpg'}] },
];

const statusMap = { new:'Pesanan Baru', process:'Diproses', ship:'Dikirim', done:'Selesai' };
const badgeMap = { new:'badge-status-new', process:'badge-status-process', ship:'badge-status-ship', done:'badge-status-done' };
let currentFilter = '';

function nextStatus(status) { const s=['new','process','ship','done']; const i=s.indexOf(status); return i<s.length-1?s[i+1]:null; }
const nextLabel = { new:'Proses Pesanan', process:'Kirim Pesanan', ship:'Tandai Diterima' };

function renderOrders() {
  const filtered = currentFilter ? SELLER_ORDERS.filter(o=>o.status===currentFilter) : SELLER_ORDERS;
  const list = document.getElementById('sellerOrdersList');
  if (!filtered.length) {
    list.innerHTML=`<div class="text-center py-5"><div style="font-size:2.5rem"></div><h5 class="mt-3 fw-800">Tidak ada pesanan</h5></div>`;
    return;
  }
  list.innerHTML = filtered.map(o=>`
  <div class="panel p-4">
    <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3">
      <div>
        <span class="fw-800" style="color:var(--ocean)">#${o.id}</span>
        <span class="badge ${badgeMap[o.status]} rounded-pill ms-2">${statusMap[o.status]}</span>
        <div style="font-size:.78rem;color:var(--text-muted);margin-top:4px">${o.date}</div>
      </div>
      <div class="text-end">
        <div class="fw-800">${rupiah(o.total)}</div>
        <div style="font-size:.78rem;color:var(--text-muted)">${o.items.length} produk · ${o.courier}</div>
      </div>
    </div>

    <div class="d-flex gap-3 align-items-center p-3 rounded-3 mb-3" style="background:var(--bg-soft)">
      <i class="bi bi-person-circle" style="font-size:1.5rem;color:var(--ocean)"></i>
      <div>
        <div class="fw-700 small">${o.buyer}</div>
        <div style="font-size:.75rem;color:var(--text-muted)">${o.address}</div>
      </div>
      <a href="chat.html?seller=1" class="btn btn-outline-navy btn-sm px-2 ms-auto"><i class="bi bi-chat me-1"></i>Chat</a>
    </div>

    <div class="d-flex gap-2 align-items-center mb-3 overflow-auto">
      ${o.items.map(i=>`<div class="d-flex gap-2 align-items-center flex-shrink-0 p-2 rounded-3" style="background:var(--card);border:1px solid var(--glass-border)">
        <img src="${i.img}" style="width:44px;height:44px;border-radius:var(--r-sm);object-fit:cover">
        <div><div class="fw-600 small">${i.name}</div><div style="font-size:.72rem;color:var(--text-muted)">x${i.qty} · ${rupiah(i.price)}</div></div>
      </div>`).join('')}
    </div>

    <div class="d-flex gap-2 flex-wrap">
      <button class="btn btn-ghost btn-sm px-3" onclick="showDetail('${o.id}')"><i class="bi bi-eye me-1"></i>Detail</button>
      <button class="btn btn-ghost btn-sm px-3" onclick="printOrder('${o.id}')"><i class="bi bi-printer me-1"></i>Cetak</button>
      ${nextStatus(o.status)?`<button class="btn btn-navy btn-sm px-3 fw-700 ms-auto" onclick="advanceOrder('${o.id}')"><i class="bi bi-arrow-right-circle me-1"></i>${nextLabel[o.status]||'Update'}</button>`:'<span class="ms-auto small text-teal"><i class="bi bi-check-circle-fill me-1"></i>Selesai</span>'}
    </div>
  </div>`).join('');
}

function showDetail(id) {
  const o = SELLER_ORDERS.find(x=>x.id===id);
  if (!o) return;
  document.getElementById('orderDetailContent').innerHTML = `
    <div class="mb-3"><div class="section-label">ID Pesanan</div><div class="fw-800">#${o.id}</div></div>
    <div class="mb-3"><div class="section-label">Pembeli</div><div class="fw-700">${o.buyer}</div><div class="small" style="color:var(--text-muted)">${o.phone}</div></div>
    <div class="mb-3"><div class="section-label">Alamat</div><div class="small">${o.address}</div></div>
    <div class="mb-3"><div class="section-label">Kurir & Resi</div><div class="fw-700">${o.courier}</div><div class="small" style="color:var(--ocean)">${o.resi}</div></div>
    <div class="mb-3"><div class="section-label">Produk</div>${o.items.map(i=>`<div class="d-flex justify-content-between small py-1"><span>${i.name} x${i.qty}</span><span class="fw-700">${rupiah(i.price*i.qty)}</span></div>`).join('')}</div>
    <div class="pt-3" style="border-top:1px solid var(--line)"><div class="d-flex justify-content-between fw-800"><span>Total</span><span style="color:var(--ocean)">${rupiah(o.total)}</span></div></div>
    ${nextStatus(o.status)?`<button class="btn btn-navy w-100 mt-3 fw-700" onclick="advanceOrder('${o.id}')">${nextLabel[o.status]||'Update'}</button>`:''}`;
  new bootstrap.Offcanvas(document.getElementById('orderDetail')).show();
}

function advanceOrder(id) {
  const o = SELLER_ORDERS.find(x=>x.id===id);
  if (!o) return;
  const next = nextStatus(o.status);
  if (!next) return;
  o.status = next;
  if (next==='ship') o.resi = o.courier.replace(' ','_').toUpperCase()+'-'+Math.random().toString(36).substr(2,10).toUpperCase();
  showToast(`Pesanan #${o.id} diupdate ke: ${statusMap[next]} ✓`,'success');
  renderOrders();
  bootstrap.Offcanvas.getInstance(document.getElementById('orderDetail'))?.hide();
}

function printOrder(id) { showToast('Mencetak invoice... 🖨️','info'); }

document.querySelectorAll('.cat-chip').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.cat-chip').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); currentFilter=b.dataset.status; renderOrders();
}));

document.addEventListener('DOMContentLoaded', renderOrders);
</script>
</body></html>
